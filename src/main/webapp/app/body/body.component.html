<div [ngClass]="getBodyClass()">
  <!-- If connected, use the internal dashboard layout container -->
  <ng-container *ngIf="isConnected">
    <div class="body-content">
      <jhi-page-ribbon />
      <router-outlet />
    </div>
    <jhi-footer />
  </ng-container>

  <!-- If NOT connected (Login Page), display just the router-outlet without dashboard cards/side-paddings -->
  <ng-container *ngIf="!isConnected">
    <router-outlet />
  </ng-container>
</div>
