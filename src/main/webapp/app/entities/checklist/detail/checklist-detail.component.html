<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (checklist(); as checklistRef) {
      <div>
        <h2 data-cy="checklistDetailsHeading"><span jhiTranslate="projectManagementApp.checklist.detail.title">Checklist</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ checklistRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="projectManagementApp.checklist.title">Title</span></dt>
          <dd>
            <span>{{ checklistRef.title }}</span>
          </dd>
          <dt><span jhiTranslate="projectManagementApp.checklist.createdDate">Created Date</span></dt>
          <dd>
            <span>{{ checklistRef.createdDate | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="projectManagementApp.checklist.task">Task</span></dt>
          <dd>
            @if (checklist()!.task) {
              <div>
                <a [routerLink]="['/task', checklist()!.task?.id, 'view']">{{ checklistRef.task?.title }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/checklist', checklistRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
