<ng-container *ngIf="!isMobile">
  <!-- Example of a standard modern wrapper structure in main.component.html -->
  <div style="display: flex; min-height: 100vh">
    <app-sidenav *ngIf="isConnected" (onToggleSideNav)="onToggleSideNav($event)"></app-sidenav>

    <div style="flex: 1; display: flex; flex-direction: column">
      <app-header *ngIf="isConnected" [collapsed]="isSideNavCollapsed" [screenWidth]="screenWidth"> </app-header>

      <app-body [collapsed]="isSideNavCollapsed" [screenWidth]="screenWidth" [isConnected]="isConnected"> </app-body>
    </div>
  </div>
</ng-container>

<ng-container *ngIf="isMobile">
  <!-- Remove the *ngIf wrapper and bind the variable directly -->
  <app-mobile [isConnected]="isConnected"></app-mobile>
</ng-container>
