<jhi-page-ribbon />

<div>
  <router-outlet name="navbar" />
</div>

<div class="container-fluid">
  <div class="card jh-card">
    <div class="mt-3">
      <button class="btn btn-primary" (click)="testNotification()" [disabled]="notificationSent">
        🔔 {{ notificationSent ? 'Notification Sent!' : 'Test Push Notification' }}
      </button>
      <span *ngIf="notificationSent" class="ml-2 text-success">✅ Check your phone!</span>
    </div>
    <router-outlet />
  </div>

  <jhi-footer />
</div>
