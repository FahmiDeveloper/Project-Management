<div class="sidenav" [ngClass]="collapsed ? 'sidenav-collapsed' : ''">
  <div class="logo-container">
    <button class="logo text-application" (click)="toggleCollapse()">PM</button>
    <div class="logo-text text-application" @fadeInOut *ngIf="collapsed">Project management</div>
    <button class="btn-close" @rotate *ngIf="collapsed" (click)="closeSidenav()">
      <i class="fal fa-times close-icon"></i>
    </button>
  </div>
  <div class="scrollwrap scrollwrap_delayed">
    <ul class="sidenav-nav">
      <li
        class="sidenav-nav-item"
        [matTooltip]="isDesktop ? navbarDataHome.label : ''"
        [matTooltipPosition]="'right'"
        [matTooltipClass]="isDesktop ? 'data-tooltip' : ''"
        [matTooltipDisabled]="isDesktop ? collapsed : false"
      >
        <a
          class="sidenav-nav-link"
          (click)="handleClick(navbarDataHome, $event)"
          *ngIf="navbarDataHome.items && navbarDataHome.items.length > 0"
          [ngClass]="getActiveClass(navbarDataHome)"
          [ngStyle]="{ width: collapsed == false ? '3rem' : '' }"
        >
          <i class="sidenav-link-icon" [class]="navbarDataHome.icon"></i>
          <span class="sidenav-link-text text-application" @fadeInOut *ngIf="collapsed">
            {{ navbarDataHome.label }}
          </span>
          <i
            *ngIf="navbarDataHome.items && collapsed"
            class="menu-collapse-icon"
            [ngClass]="!navbarDataHome.expanded ? 'fal fa-angle-right' : 'fal fa-angle-down'"
          ></i>
        </a>

        <a
          class="sidenav-nav-link"
          *ngIf="!navbarDataHome.items || (navbarDataHome.items && navbarDataHome.items.length === 0)"
          [ngStyle]="{ width: collapsed == false ? '3rem' : '' }"
          [routerLink]="[navbarDataHome.routeLink]"
          (click)="shrinkItems(navbarDataHome, $event)"
        >
          <i class="sidenav-link-icon" [class]="navbarDataHome.icon"></i>
          <span class="sidenav-link-text text-application" @fadeInOut *ngIf="collapsed">
            {{ navbarDataHome.label }}
          </span>
        </a>
        <div *ngIf="collapsed && navbarDataHome.items && navbarDataHome.items.length > 0">
          <app-sublevel-menu [data]="navbarDataHome" [collapsed]="collapsed" [multiple]="multiple" [expanded]="navbarDataHome.expanded">
          </app-sublevel-menu>
        </div>
      </li>

      <li
        class="sidenav-nav-item"
        *ngFor="let data of getItems()"
        [matTooltip]="isDesktop ? data.label : ''"
        [matTooltipPosition]="'right'"
        [matTooltipClass]="isDesktop ? 'data-tooltip' : ''"
        [matTooltipDisabled]="isDesktop ? collapsed : false"
      >
        <a
          class="sidenav-nav-link"
          (click)="handleClick(data, $event)"
          *ngIf="data.items && data.items.length > 0"
          [ngClass]="getActiveClass(data)"
          [ngStyle]="{ width: collapsed == false ? '3rem' : '' }"
        >
          <i class="sidenav-link-icon" [class]="data.icon"></i>
          <span class="sidenav-link-text text-application" @fadeInOut *ngIf="collapsed">
            {{ data.label }}
          </span>
          <i
            *ngIf="data.items && collapsed"
            class="menu-collapse-icon"
            [ngClass]="!data.expanded ? 'fal fa-angle-right' : 'fal fa-angle-down'"
          ></i>
        </a>

        <a
          class="sidenav-nav-link"
          *ngIf="!data.items || (data.items && data.items.length === 0)"
          [ngStyle]="{ width: collapsed == false ? '3rem' : '' }"
          (click)="shrinkItems(data, $event)"
        >
          <i class="sidenav-link-icon" [class]="data.icon"></i>
          <span class="sidenav-link-text text-application" @fadeInOut *ngIf="collapsed">
            {{ data.label }}
          </span>
        </a>
        <div *ngIf="collapsed && data.items && data.items.length > 0">
          <app-sublevel-menu [data]="data" [collapsed]="collapsed" [multiple]="multiple" [expanded]="data.expanded"> </app-sublevel-menu>
        </div>
      </li>
    </ul>
  </div>
</div>
